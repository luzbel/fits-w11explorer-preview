name: Build and Release

on:
  push:
    tags:
      - '*' # Se ejecuta al crear cualquier tag (ej: 1.0, v1.0, etc.)

jobs:
  build-and-release:
    runs-on: windows-latest
    
    # Necesario para que el runner tenga permisos de crear el release
    permissions:
      contents: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build Project
        # Aquí puedes remover '-p:Version=${{ github.ref_name }}' si usas tags que contengan letras y fallase
        run: dotnet build FitsPreviewHandler.csproj -c Release /p:Version=${{ github.ref_name }}

      - name: Prepare Release Output
        run: |
          mkdir ReleaseOutput
          copy bin\Release\net48\FitsPreviewHandler.dll ReleaseOutput\
          copy README.md ReleaseOutput\
          copy README.es.md ReleaseOutput\
          copy register.bat ReleaseOutput\
          copy unregister.bat ReleaseOutput\

      - name: Create ZIP Archive
        run: |
          Compress-Archive -Path ReleaseOutput\* -DestinationPath FitsPreviewHandler-${{ github.ref_name }}.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: FitsPreviewHandler-${{ github.ref_name }}.zip
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
